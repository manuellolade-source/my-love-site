<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Like Everything That's Wrong With You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(-45deg, #f093fb, #f5576c, #ff6b6b, #ff8e53);
            background-size: 400% 400%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            pointer-events: none;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 80px 50px;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(245, 87, 108, 0.3), 0 0 60px rgba(255, 107, 107, 0.2);
            max-width: 600px;
            animation: slideInScale 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 10;
            border: 4px solid rgba(245, 87, 108, 0.2);
        }

        @keyframes slideInScale {
            from {
                opacity: 0;
                transform: translateY(-60px) scale(0.7) rotateX(20deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1) rotateX(0);
            }
        }

        h1 {
            color: #ff5a5a;
            font-size: 2.8em;
            margin-bottom: 30px;
            line-height: 1.5;
            animation: textGlow 2.5s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { 
                text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
                transform: scale(1);
            }
            50% { 
                text-shadow: 0 0 30px rgba(255, 107, 107, 0.8);
                transform: scale(1.02);
            }
        }

        .heart-emoji {
            font-size: 4em;
            display: inline-block;
            animation: heartBeat 0.6s ease-in-out infinite;
            margin: 20px 0;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
        }

        .heart-float {
            position: absolute;
            font-size: 3em;
            opacity: 0.8;
            animation: floatUp 3s ease-in infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(20px) scale(0.5);
                opacity: 0;
            }
        }

        .button-group {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 16px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        .start-over-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .start-over-btn:hover {
            transform: translateY(-5px) scale(1.08);
            box-shadow: 0 12px 35px rgba(245, 87, 108, 0.6);
        }

        /* Sparkle effect */
        .sparkle {
            position: absolute;
            pointer-events: none;
        }

        @keyframes sparkle {
            0% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: scale(0) rotate(360deg) translateY(-30px);
            }
        }

        /* Pulsing stars */
        .star {
            position: absolute;
            font-size: 1.5em;
            opacity: 0.6;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>I like everything that's wrong with you</h1>
        <div class="heart-emoji" id="mainHeart">❤️</div>
        
        <div class="button-group">
            <button class="start-over-btn" onclick="goHome()">Start Over</button>
        </div>
    </div>

    <script>
        // Create floating hearts
        function createFloatingHearts() {
            const container = document.querySelector('.container');
            const colors = ['❤️', '💕', '💖', '💗', '💝'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart-float';
                heart.innerHTML = colors[Math.floor(Math.random() * colors.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = '100%';
                heart.style.animationDuration = (2 + Math.random() * 1) + 's';
                container.appendChild(heart);
                
                setTimeout(() => heart.remove(), 3000);
            }, 300);
        }

        // Create sparkles on mouse move
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.95) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.innerHTML = '✨';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                sparkle.style.fontSize = (10 + Math.random() * 20) + 'px';
                sparkle.style.animation = `sparkle ${1 + Math.random() * 0.5}s ease-out forwards`;
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 1500);
            }
        });

        // Create background particles
        function createParticles() {
            const particles = document.getElementById('particles');
            const symbols = ['✨', '⭐', '💫', '🌟'];
            
            for (let i = 0; i < 12; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                particles.appendChild(star);
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // Initialize
        createParticles();
        createFloatingHearts();
    </script>
</body>
</html>
