<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
            background-size: 400% 400%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Falling hearts background */
        .heart-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .falling-heart {
            position: absolute;
            font-size: 2em;
            opacity: 0.7;
            animation: fall 6s linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.98);
            padding: 80px 50px;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3), 0 0 60px rgba(102, 126, 234, 0.2);
            max-width: 600px;
            animation: slideIn 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 10;
            border: 5px solid rgba(102, 126, 234, 0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.8) rotateY(30deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1) rotateY(0);
            }
        }

        h1 {
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.8em;
            margin-bottom: 50px;
            line-height: 1.5;
            animation: textWave 3s ease-in-out infinite;
        }

        @keyframes textWave {
            0%, 100% { 
                text-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
                transform: scale(1);
            }
            50% { 
                text-shadow: 0 0 30px rgba(245, 87, 108, 0.6);
                transform: scale(1.02);
            }
        }

        .button-group {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 5;
        }

        button {
            padding: 18px 45px;
            font-size: 1.3em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: bold;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.7s, height 0.7s;
        }

        button::after {
            content: '✨';
            position: absolute;
            font-size: 1.2em;
            pointer-events: none;
        }

        button:hover::before {
            width: 350px;
            height: 350px;
        }

        .yes-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: relative;
        }

        .yes-btn:hover {
            transform: translateY(-8px) scale(1.12);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .yes-btn:active {
            transform: scale(0.95);
        }

        /* Confetti particle */
        .confetti {
            position: fixed;
            pointer-events: none;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Sparkle effect */
        .sparkle {
            position: absolute;
            pointer-events: none;
        }

        @keyframes sparkle {
            0% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: scale(0) rotate(360deg) translateY(-40px);
            }
        }
    </style>
</head>
<body>
    <div class="heart-rain" id="heartRain"></div>
    
    <div class="container">
        <h1>Would you be my distant lover? 💔</h1>
        <div class="button-group">
            <button class="yes-btn" onclick="celebrate()">Yes</button>
            <button class="yes-btn" onclick="celebrate()">Yes</button>
        </div>
    </div>

    <script>
        // Create falling hearts background
        function createFallingHearts() {
            const heartRain = document.getElementById('heartRain');
            const hearts = ['❤️', '💕', '💖', '💗', '💝', '💞'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'falling-heart';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = '-10vh';
                heart.style.animationDuration = (6 + Math.random() * 4) + 's';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heartRain.appendChild(heart);
                
                setTimeout(() => heart.remove(), 10000);
            }, 400);
        }

        // Confetti explosion
        function createConfetti() {
            const colors = ['🎉', '✨', '💫', '⭐', '🌟', '💕', '❤️', '💖'];
            const confettiCount = 50;
            
            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.innerHTML = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = window.innerWidth / 2 + 'px';
                confetti.style.top = window.innerHeight / 2 + 'px';
                confetti.style.fontSize = (20 + Math.random() * 30) + 'px';
                
                const angle = (Math.PI * 2 * i) / confettiCount;
                const velocity = 8 + Math.random() * 15;
                const tx = Math.cos(angle) * velocity * 100;
                const ty = Math.sin(angle) * velocity * 100;
                
                confetti.style.animation = `confettiFall ${3 + Math.random() * 2}s ease-in forwards`;
                confetti.style.transform = `translate(${tx}px, ${ty}px) rotate(0deg)`;
                
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // Sparkle effect on mouse move
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.92) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.innerHTML = '✨';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                sparkle.style.fontSize = (15 + Math.random() * 25) + 'px';
                sparkle.style.animation = `sparkle ${1.5 + Math.random() * 0.5}s ease-out forwards`;
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 2000);
            }
        });

        function celebrate() {
            createConfetti();
            setTimeout(() => {
                window.location.href = 'response.html';
            }, 800);
        }

        // Initialize
        createFallingHearts();
    </script>
</body>
</html>
